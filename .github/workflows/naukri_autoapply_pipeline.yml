name: Naukri Auto-Apply Pipeline (scrape → watch → apply)

# Fire manually or from the external cron site via the workflow-dispatch API:
#   POST /repos/OzSpidey/Job_Automation_IN/actions/workflows/naukri_autoapply_pipeline.yml/dispatches {"ref":"main"}
on:
  workflow_dispatch:
  repository_dispatch:
    types: [naukri-autoapply-pipeline]

permissions:
  contents: write

jobs:
  # 1) Scrape Naukri India (headful+Xvfb) → email new SWE roles to the inbox
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # each job needs the latest committed queue/seen state
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install python-dotenv playwright
      - run: python -m playwright install chromium && python -m playwright install-deps chromium
      - run: sudo apt-get install -y xvfb
      - name: Scrape + email (headful under Xvfb)
        env:
          EMAIL_TO_INDIA:     ${{ secrets.EMAIL_TO_INDIA }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          HEADLESS: "false"
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 2
          python naukri_scraper_india.py
      - name: Persist seen-jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/naukri_india_seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update naukri india seen jobs [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break; sleep $((i * 3)); done

  # 2) Read the inbox → queue new roles (shared watcher, source=naukri)
  watch:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # each job needs the latest committed queue/seen state
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Read inbox + queue (wait for email delivery first)
        env:
          AUTOAPPLY_GMAIL_USER:         oswin.autoapply@gmail.com
          AUTOAPPLY_GMAIL_APP_PASSWORD: ${{ secrets.AUTOAPPLY_GMAIL_APP_PASSWORD }}
          EMAIL_SENDER:                 ${{ secrets.EMAIL_SENDER }}
        run: |
          sleep 30
          python gmail_autoapply_watcher.py
      - name: Persist queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/autoapply_queue.json
          git diff --staged --quiet || git commit -m "chore: update autoapply queue [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break; sleep $((i * 3)); done

  # 3) Apply to Naukri roles (headful+Xvfb) — submits at most APPLY_LIMIT/run, only if armed
  apply:
    needs: watch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # each job needs the latest committed queue/seen state
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install playwright && python -m playwright install chromium && python -m playwright install-deps chromium
      - run: sudo apt-get install -y xvfb
      - name: Apply (headful under Xvfb)
        env:
          NAUKRI_SESSION_B64:   ${{ secrets.NAUKRI_SESSION_B64 }}
          NAUKRI_ANSWERS_JSON:  ${{ secrets.NAUKRI_ANSWERS_JSON }}
          NAUKRI_ENABLE_SUBMIT: ${{ vars.NAUKRI_ENABLE_SUBMIT }}
          APPLY_LIMIT:          "10"
          EMAIL_SENDER:         ${{ secrets.EMAIL_SENDER }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          APPLY_NOTIFY_EMAIL:   ${{ secrets.APPLY_NOTIFY_EMAIL }}
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 2
          python naukri_autoapply.py --apply
      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: naukri-pipeline-apply
          path: |
            screenshots/
            recon/
          if-no-files-found: ignore
          retention-days: 7
      - name: Persist queue/applied state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/autoapply_queue.json json/autoapply_applied.json
          git diff --staged --quiet || git commit -m "chore: update autoapply state [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do git pull --rebase origin main && git push && break; sleep $((i * 3)); done
