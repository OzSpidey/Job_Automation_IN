name: Gmail Auto-Apply Watcher

on:
  workflow_dispatch:

permissions:
  contents: write            # commits json/autoapply_queue.json back

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run watcher
        env:
          AUTOAPPLY_GMAIL_USER:         oswin.autoapply@gmail.com
          AUTOAPPLY_GMAIL_APP_PASSWORD: ${{ secrets.AUTOAPPLY_GMAIL_APP_PASSWORD }}
          EMAIL_SENDER:                 ${{ secrets.EMAIL_SENDER }}
        run: python gmail_autoapply_watcher.py

      - name: Persist queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add json/autoapply_queue.json
          git diff --staged --quiet || git commit -m "chore: update autoapply queue [skip ci]"
          git checkout -- . 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in $((i * 3))s..."
            sleep $((i * 3))
          done
